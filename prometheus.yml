global:
  scrape_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus" # Las metricas promhttp_ si sirven en prometheus

  - job_name: "collector"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["collectorDefinitivo:8888"]
        labels:
          service: "collector"
    metric_relabel_configs:
      - source_labels: [ __name__ ]
        regex: "promhttp_.*"
        action: drop

  - job_name: "loki"
    metrics_path: "/metrics"
    static_configs:
      - targets: [ "loki:3100" ]
        labels:
          service: "loki"
    metric_relabel_configs:
      - source_labels: [ __name__ ]
        regex: "promhttp_.*"
        action: drop

  - job_name: "tempo"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: "tempo"
    metric_relabel_configs:
      - source_labels: [ __name__ ]
        regex: "promhttp_.*"
        action: drop

  - job_name: "collector-exporter"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["collectorDefinitivo:9464"]
        labels:
          service: "collector"

  - job_name: "ws-mapfre-dev"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["98.93.78.80:5000"]
        labels:
          service: "ws-mapfre-dev"